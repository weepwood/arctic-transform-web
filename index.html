<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="由冰屋、创意产品与冰晶月亮组成的沉浸式 3D 滚动叙事网页。"
    />
    <meta name="theme-color" content="#071225" />
    <title>Arctic Transform — Ice to Imagination</title>
  </head>
  <body>
    <div id="loading" class="loading" role="status" aria-live="polite">
      <div class="loading__mark" aria-hidden="true"></div>
      <p>正在凝结冰晶</p>
      <div class="loading__track"><span id="loading-progress"></span></div>
      <output id="loading-value">0%</output>
    </div>

    <main id="experience">
      <div id="webgl" aria-label="冰屋解构并重组为月亮的三维场景"></div>

      <header class="brand" aria-label="Arctic Transform">
        <span class="brand__mark" aria-hidden="true"></span>
        <span>ARCTIC / TRANSFORM</span>
      </header>

      <aside class="chapter" aria-live="polite">
        <span id="chapter-index" class="chapter__index">01 / 05</span>
        <div class="chapter__line" aria-hidden="true"></div>
        <span id="chapter-name" class="chapter__name">SHELTER</span>
      </aside>

      <section class="copy" aria-live="polite">
        <p id="eyebrow" class="copy__eyebrow">A SINGLE BLOCK</p>
        <h1 id="headline">Every idea begins<br />with a single block.</h1>
        <p id="description" class="copy__description">
          一座由独立冰晶模块构成的庇护所，正等待被重新想象。
        </p>
      </section>

      <div class="scroll-cue" aria-hidden="true">
        <span>SCROLL TO TRANSFORM</span>
        <i></i>
      </div>

      <div class="progress" aria-hidden="true">
        <span id="progress-fill"></span>
      </div>

      <div class="vignette" aria-hidden="true"></div>
      <div class="noise" aria-hidden="true"></div>

      <section class="scroll-track" aria-hidden="true">
        <div data-stage="shelter"></div>
        <div data-stage="release"></div>
        <div data-stage="speaker"></div>
        <div data-stage="lamp"></div>
        <div data-stage="camera"></div>
        <div data-stage="moon"></div>
        <div data-stage="aurora"></div>
      </section>

      <noscript>
        <p class="fallback">此体验需要启用 JavaScript。</p>
      </noscript>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
